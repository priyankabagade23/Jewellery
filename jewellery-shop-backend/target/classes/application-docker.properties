spring.application.name=jewellery-shop-backend

# Fixed port for Docker deployment
server.port=8080

# H2 Database configuration for Docker
spring.datasource.url=jdbc:h2:mem:jewellerydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.SnakeCasePhysicalNamingStrategy
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.validator.apply_to_ddl=false
spring.jpa.properties.hibernate.check_nullability=false
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# JWT Configuration
jwt.secret=mySecretKeyForJewelleryShopBackend2024
jwt.expiration=86400

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:3001
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*

# AWS Configuration
aws.region=us-east-1
aws.access.key=dummy-access-key
aws.secret.key=dummy-secret-key
aws.s3.bucket.name=jewellery-shop-bucket
aws.sqs.queue.name=jewellery-shop-queue
aws.lambda.function.name=jewellery-shop-processor
