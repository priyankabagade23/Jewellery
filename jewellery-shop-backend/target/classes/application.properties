spring.application.name=jewellery-shop-backend

# Random free port by default to avoid conflicts (override with PORT env var)
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:jewellery;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2

springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# JWT Configuration
jwt.secret=mySecretKeyForJewelleryShopBackend2024
jwt.expiration=86400

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*

# AWS Configuration
aws.region=us-east-1
aws.access.key=dummy-access-key
aws.secret.key=dummy-secret-key
aws.s3.bucket.name=jewellery-shop-bucket
aws.sqs.queue.name=jewellery-shop-queue
aws.lambda.function.name=jewellery-shop-processor

