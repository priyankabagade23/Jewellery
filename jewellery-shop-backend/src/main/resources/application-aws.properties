# AWS Configuration
aws.region=us-east-1
aws.access.key=${AWS_ACCESS_KEY_ID}
aws.secret.key=${AWS_SECRET_ACCESS_KEY}

# S3 Configuration
aws.s3.bucket.name=jewellery-shop-bucket
aws.s3.region=us-east-1

# SQS Configuration
aws.sqs.queue.name=jewellery-shop-queue
aws.sqs.region=us-east-1

# Lambda Configuration
aws.lambda.function.name=jewellery-shop-processor
aws.lambda.region=us-east-1

# Database Configuration (for production)
spring.datasource.url=jdbc:postgresql://your-rds-endpoint:5432/jewellery_shop
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
