spring.application.name=demo
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Avoid "port already in use" on repeated runs.
# server.port=0 makes Spring Boot pick a free random port each time.
# You can still override by setting an environment variable PORT.
server.port=${PORT:0}
